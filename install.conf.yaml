- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ["~"]

- link:
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/fish_plugins: fish/fish_plugins
    ~/.config/fish/conf.d:
      path: fish/conf.d/*.fish
      glob: true
    ~/.config/fish/functions:
      path: fish/functions/*.fish
      glob: true
    ~/.config/fish/completions:
      path: fish/completions/*.fish
      glob: true

    ~/Brewfile: Brewfile
    ~/.gitconfig: .gitconfig
    ~/.tool-versions: tool-versions


- shell:
    - [brew bundle --verbose --file=~/Brewfile, Installing from Brewfile]

- asdf:
    - plugin: java
      url: https://github.com/halcyon/asdf-java.git
    - plugin: maven
      url: https://github.com/halcyon/asdf-maven.git
    - plugin: nodejs
      url: https://github.com/asdf-vm/asdf-nodejs.git

- shell:
    - [asdf install, Installing asdf tool versions]

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [./install_scripts/install_fisher.fish, Installing fisher]
